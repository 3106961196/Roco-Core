# 洛克王国世界 - 辅助核心配置
roco:
  # 启用的模块
  modules:
    merchant: true    # 远行商人（Phase 1）
    hatch: false      # 孵蛋反查（Phase 3）
    pet: false        # 精灵信息（Phase 3）
    skill: false      # 技能信息（Phase 3）

  # 远行商人配置
  merchant:
    # 数据源配置
    dataSources:
      - type: "web"
        url: "https://www.onebiji.com/hykb_tools/comm/lkwgmerchant/preview.php?id=1&immgj=0&imm=1"
        # 刷新时间点（北京时间，基础时间，delayMinutes 控制延迟检测）
        refreshTimes: ["08:00", "12:00", "16:00", "20:00"]

    # 检测策略
    detection:
      # 到点后每分钟检测一次
      intervalSeconds: 60
      # 最大重试次数（防止无限循环）
      maxRetries: 30
      # 刷新后延迟检测分钟数
      delayMinutes: 1

    # 推送配置
    push:
      enabled: true           # 启用自动推送
      cooldownSeconds: 300    # 推送冷却时间（秒），防止短时间内重复推送
      maxRetries: 3           # 单个目标推送失败最大重试次数
      retryDelaySeconds: 10   # 重试间隔（秒）

    # 订阅配置
    subscription:
      maxSubscriptionsPerTarget: 1  # 每个目标最大订阅数
      autoCleanupDays: 30           # 自动清理超过此天数的订阅（需手动触发清理命令）

    # 缓存配置
    cache:
      enabled: true
      ttl: 1800  # 缓存30分钟（足够覆盖一轮）
      maxHistoryRecords: 100

    # UI渲染配置
    ui:
      width: 820
      imageQuality: 90
      format: "jpeg"

    # 浏览器配置
    browser:
      # Chrome可执行路径，留空则自动查找
      executablePath: ""
      headless: true

    # 资源文件配置
    assets:
      # 基础资源源目录（bg.jpg, coin.png, yuanxingshangren.png）
      # 留空则跳过复制
      sourceDir: ""

  # 全局配置
  global:
    debug: true       # 开发阶段开启调试（调试模式下保存渲染HTML）
    logLevel: "debug"  # 详细日志
    rateLimit: 10     # 请求频率限制
